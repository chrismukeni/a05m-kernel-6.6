name: Build A05 Kernel (KSU 22000)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt update && sudo apt install -y bc bison build-essential flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Download Clang (Android 15 Toolchain)
        run: |
          mkdir clang
          cd clang
          curl -LO "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522815.tar.gz"
          tar -xf clang-r522815.tar.gz

      - name: Integrate KernelSU v1.0.1 (Driver 22000)
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v1.0.1

      - name: Build Kernel Image
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make O=out a05_defconfig
          make -j$(nproc) O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: A05-KSU-22000-Image
          path: out/arch/arm64/boot/Image.gz-dtb

